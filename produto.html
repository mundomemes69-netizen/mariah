<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto | Açaí Delas</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="container">

<a href="index.html" class="logo">
Açaí Delas
</a>

</div>

</header>



<section class="produto-detalhes">

<div class="container">


<div class="produto-box">


<img id="produtoImagem" src="" alt="">


<div class="produto-info">


<h1 id="produtoNome"></h1>


<p id="produtoDescricao"></p>


<h2 id="produtoPreco"></h2>

<h3>Tamanho</h3>

<label>
<input type="radio" name="tamanho" value="12" checked>
300ml - R$12,00
</label>


<label>
<input type="radio" name="tamanho" value="18">
500ml - R$18,00
</label>


<label>
<input type="radio" name="tamanho" value="25">
700ml - R$25,00
</label>


<label>
<input type="radio" name="tamanho" value="35">
1 Litro - R$35,00
</label>

<h3>Adicionais</h3>


<label>
<input type="checkbox" value="Leite Ninho" data-preco="3">
Leite Ninho + R$3
</label>


<label>
<input type="checkbox" value="Morango" data-preco="3">
Morango + R$3
</label>


<label>
<input type="checkbox" value="Granola" data-preco="2">
Granola + R$2
</label>


<label>
<input type="checkbox" value="Paçoca" data-preco="2">
Paçoca + R$2
</label>



 
<h3>Quantidade</h3>

<div class="quantidade">

<button onclick="alterarQuantidade(-1)">
- 
</button>


<span id="quantidade">
1
</span>


<button onclick="alterarQuantidade(1)">
+
</button>

</div>


 <div class="botoes-produto">

<button onclick="adicionarCarrinho()" class="btn-carrinho">
🛒 Adicionar ao Carrinho
</button>


<button onclick="pedirWhatsApp()" class="btn-whatsapp">
💬 Pedir pelo WhatsApp
</button>

</div>
<div class="botoes-produto">



</div>



</div>


</div>


</div>


</section>



<script src="script.js"></script>


</body>

</html>
